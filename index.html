<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
  <!-- Custom Tab Name -->
  <title>TEAM FAMILY #</title>
  
  <!-- Black Thunder Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23ffffff'/%3E%3Cpath d='M55 20 L35 55 L50 55 L45 80 L65 45 L50 45 Z' fill='%23000000'/%3E%3C/svg%3E">

  <style>
    /* Strict No-Scroll & Full Screen Setup */
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: #000000; 
      color: #ffffff;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      height: 100vh; /* Standard fallback */
      height: 100dvh; /* Modern fix for mobile address bars */
      overflow: hidden; /* Completely disables scrolling */
      display: flex;
      flex-direction: column;
    }

    /* Center Content Container - Shifted Slightly Up */
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      /* The 12vh at the end pushes everything up from the bottom slightly */
      padding: 0 20px 12vh 20px; 
    }

    /* Fluid Typography (Auto-scales between mobile and desktop) */
    h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      text-transform: uppercase;
      letter-spacing: 4px;
      margin-top: 0;
      margin-bottom: 15px;
      text-align: center;
    }

    p {
      font-size: clamp(0.95rem, 2.5vw, 1.2rem);
      color: #a0a0a0;
      max-width: 600px;
      margin-bottom: 30px;
      line-height: 1.5;
      text-align: center;
    }

    /* Release Info Container */
    .release-info {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 35px;
      font-size: clamp(0.9rem, 2.5vw, 1.1rem);
      color: #cccccc;
      letter-spacing: 1px;
    }

    /* Official Android Logo */
    .android-icon {
      width: clamp(20px, 4vw, 28px);
      height: clamp(20px, 4vw, 28px);
      fill: #3DDC84; /* Official Android Green */
      flex-shrink: 0;
    }

    /* Starlink-Style Button with Animations */
    .download-btn {
      background-color: transparent;
      color: #ffffff;
      border: 2px solid #ffffff;
      padding: clamp(12px, 3vw, 15px) clamp(30px, 6vw, 40px);
      font-size: clamp(0.9rem, 2vw, 1.1rem);
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-decoration: none;
      /* Added a specialized transition for the click effect */
      transition: transform 0.1s ease-out, background-color 0.2s ease, color 0.2s ease;
      cursor: pointer;
      display: inline-block;
    }

    /* Button Hover Effect */
    .download-btn:hover {
      background-color: #ffffff;
      color: #000000;
    }

    /* New: Button Click (Active) Animation */
    .download-btn:active {
      transform: scale(0.92); /* Shrinks the button slightly when pressed */
      background-color: #cccccc; /* Dims slightly for visual feedback */
      border-color: #cccccc;
    }

    /* Locked Bottom Footer */
    .footer {
      flex-shrink: 0; /* Prevents footer from squishing */
      padding: 20px;
      font-size: 0.75rem;
      color: #555555;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-align: center;
      width: 100%;
    }
  </style>
</head>
<body>

  <!-- Main Content Box -->
  <div class="hero">
    <h1>Experience The App</h1>
    <p>Fast, reliable, and available anywhere. Install the official APK directly to your device.</p>
    
    <!-- File Name with Android Logo -->
    <div class="release-info">
      <svg class="android-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.6 9.48l1.84-3.18c.16-.28.06-.63-.2-.79-.27-.15-.62-.06-.78.2l-1.9 3.28C15.03 8.35 13.56 8 12 8s-3.03.35-4.56 1L5.54 5.71c-.16-.26-.51-.35-.78-.2-.26.16-.36.51-.2.79l1.84 3.18C3.14 11.23 1 14.39 1 18h22c0-3.61-2.14-6.77-5.4-8.52zM7 15.25c-.69 0-1.25-.56-1.25-1.25s.56-1.25 1.25-1.25 1.25.56 1.25 1.25-.56 1.25-1.25 1.25zm10 0c-.69 0-1.25-.56-1.25-1.25s.56-1.25 1.25-1.25 1.25.56 1.25 1.25-.56 1.25-1.25 1.25z"/>
      </svg>
      <span>SmsSyncApp.apk (Latest Release)</span>
    </div>

    <!-- Starlink Button -->
    <a href="SmsSyncApp.apk" download class="download-btn">Download APK</a>
  </div>

  <!-- Locked Bottom Footer -->
  <div class="footer">
    POWERED BY TEAM FAMILY #
  </div>

</body>
</html>
