<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Download Our App</title>
  <style>
    /* Overall Page Styling - Dark, Modern, Space Vibe */
    body {
      margin: 0;
      padding: 0;
      background-color: #000000; /* Deep space black */
      color: #ffffff;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      text-align: center;
    }

    /* Main Content Area */
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
      background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
    }

    /* Big, Bold Headings */
    h1 {
      font-size: 3.5rem;
      text-transform: uppercase;
      letter-spacing: 4px;
      margin-bottom: 15px;
    }

    /* Subtext */
    p {
      font-size: 1.2rem;
      color: #a0a0a0;
      max-width: 600px;
      margin-bottom: 50px;
      line-height: 1.6;
    }

    /* The Starlink-Style Button */
    .download-btn {
      background-color: transparent;
      color: #ffffff;
      border: 2px solid #ffffff;
      padding: 15px 40px;
      font-size: 1.1rem;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-decoration: none;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    /* Button Hover Effect (Inverts colors) */
    .download-btn:hover {
      background-color: #ffffff;
      color: #000000;
    }

    /* Custom Footer */
    .footer {
      padding: 25px;
      font-size: 0.85rem;
      color: #555555;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div class="hero">
    <h1>Experience The App</h1>
    <p>Fast, reliable, and available anywhere. Click below to install the official APK directly to your Android device.</p>
    
    <a href="SmsSyncApp.apk" download class="download-btn">Download APK</a>
  </div>

  <div class="footer">
    POWERED BY TEAM FAMILY #
  </div>

</body>
</html>
